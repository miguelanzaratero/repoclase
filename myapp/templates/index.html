<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django ECCI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f8;
            color: #1f2937;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 680px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #204172;
        }
        code {
            background: #eef2f7;
            padding: 4px 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Aplicación Django funcionando</h1>
        <p>Proyecto listo para Docker y GitHub.</p>
        <p>Ruta activa: <code>/myapp/</code></p>
    </main>
</body>
</html>
